name: NovaMart
options:
  bundleIdPrefix: com.novamart
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16"
  createIntermediateGroups: true
  groupSortPosition: top
  defaultConfig: Debug

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    IPHONEOS_DEPLOYMENT_TARGET: "18.0"
    TARGETED_DEVICE_FAMILY: "1"
    PRODUCT_BUNDLE_IDENTIFIER: com.novamart.app
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    SWIFT_EMIT_LOC_STRINGS: YES
    ENABLE_PREVIEWS: YES
    DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
    ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor

configs:
  Debug:
    settings:
      SWIFT_OPTIMIZATION_LEVEL: "-Onone"
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
  Release:
    settings:
      SWIFT_OPTIMIZATION_LEVEL: "-O"

targets:
  NovaMart:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: NovaMart
        excludes:
          - "**/*.md"
    resources:
      - path: NovaMart/Assets.xcassets
        optional: true
      - path: NovaMart/Preview Content
        optional: true
    settings:
      base:
        INFOPLIST_FILE: NovaMart/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.novamart.app
        PRODUCT_NAME: NovaMart
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_HARDENED_RUNTIME: YES
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
      Debug:
        SWIFT_OPTIMIZATION_LEVEL: "-Onone"
      Release:
        SWIFT_OPTIMIZATION_LEVEL: "-O"
        VALIDATE_PRODUCT: YES
    entitlements:
      path: NovaMart/NovaMart.entitlements
      properties:
        com.apple.developer.applesignin: []
    info:
      path: NovaMart/Info.plist
      properties:
        CFBundleName: NovaMart
        CFBundleDisplayName: NovaMart
        CFBundleIdentifier: com.novamart.app
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        LSRequiresIPhoneOS: YES
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: NO
        UILaunchScreen: {}
        UIRequiredDeviceCapabilities:
          - arm64
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSFaceIDUsageDescription: "Sign in faster and more securely with Face ID."
        NSCameraUsageDescription: "Scan barcodes and capture product photos."
        NSPhotoLibraryUsageDescription: "Choose photos for your profile or product reviews."
        NSUserNotificationsUsageDescription: "Get notified about your orders and exclusive deals."
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - novamart
            CFBundleURLName: com.novamart.app

schemes:
  NovaMart:
    build:
      targets:
        NovaMart: all
    run:
      config: Debug
      commandLineArguments:
        "-com.apple.CoreData.ConcurrencyDebug": "1"
    test:
      config: Debug
      gatherCoverageData: true
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
